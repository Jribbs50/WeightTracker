<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Weight Journey" />
<meta name="theme-color" content="#ECEEEA" />
<title>Weight Journey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Spline+Sans:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#ECEEEA;--panel:#FFFFFF;--ink:#1B2420;--muted:#6E7872;
  --line:#DCE0DA;--accent:#1E7B5A;--accent-deep:#145C42;--hot:#D9663B;
}
body{font-family:'Spline Sans',system-ui,sans-serif;background:var(--paper);color:var(--ink);
  min-height:100vh;padding:28px 18px calc(56px + env(safe-area-inset-bottom));-webkit-font-smoothing:antialiased}
.wrap{max-width:780px;margin:0 auto}
.eyebrow{font-family:'Fraunces',serif;font-weight:600;letter-spacing:.16em;text-transform:uppercase;font-size:12px;color:var(--accent-deep);opacity:.9}
.hero{margin-top:10px;display:flex;align-items:flex-end;flex-wrap:wrap;gap:16px}
.now{font-family:'Spline Sans Mono',monospace;font-weight:600;font-size:62px;line-height:.9;letter-spacing:-.02em}
.now span{font-size:22px;color:var(--muted);margin-left:6px;font-weight:500}
.chip{display:inline-flex;align-items:baseline;gap:6px;background:rgba(30,123,90,.12);color:var(--accent-deep);
  font-family:'Spline Sans Mono',monospace;font-weight:600;padding:7px 12px;border-radius:999px;font-size:15px;margin-bottom:6px}
.chip small{font-size:11px;opacity:.7;font-weight:500;letter-spacing:.04em}
.muted{color:var(--muted);font-size:13px;margin-top:4px}
.strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:24px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px}
.stat .k{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.stat .v{font-family:'Spline Sans Mono',monospace;font-weight:600;font-size:24px;margin-top:8px}
.stat .v small{font-size:12px;color:var(--muted);font-weight:500}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:20px;margin-top:18px}
.cardhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.cardtitle{font-family:'Fraunces',serif;font-weight:600;font-size:18px}
.chartbox{width:100%;margin-top:6px}
svg.chart{width:100%;height:auto;display:block}
svg.chart text{font-family:'Spline Sans Mono',monospace;fill:var(--muted);font-size:11px}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:12px}
.leg{display:flex;align-items:center;gap:7px;font-size:12.5px}
.swatch{width:18px;border-top-width:3px;border-top-style:solid;border-radius:2px}
.goals{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
.goal{border:1px solid var(--line);border-radius:14px;padding:16px}
.goal .gh{display:flex;align-items:center;gap:8px}
.goal .gdot{width:11px;height:11px;border-radius:3px}
.goal .gname{font-weight:600;font-size:14px}
.goal .gtarget{font-family:'Spline Sans Mono',monospace;font-size:26px;font-weight:600;margin-top:10px;letter-spacing:-.01em}
.goal .gtarget i{font-style:normal;font-size:14px;color:var(--muted)}
.goal .gsub{font-size:12px;color:var(--muted);margin-top:2px}
.goal .grow{display:flex;justify-content:space-between;font-size:13px;margin-top:9px}
.goal .grow b{font-family:'Spline Sans Mono',monospace;font-weight:600}
.verdict{display:inline-block;margin-top:12px;font-size:12.5px;font-weight:600;padding:5px 10px;border-radius:999px}
.v-good{background:rgba(30,123,90,.13);color:var(--accent-deep)}
.v-bad{background:rgba(217,102,59,.13);color:#B24A22}
.comp{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
.comp .k{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
.comp .v{font-family:'Spline Sans Mono',monospace;font-weight:600;font-size:18px;margin-top:6px}
.fields{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:end}
.field label{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.input{width:100%;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:15px;color:var(--ink);font-family:'Spline Sans Mono',monospace}
.input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:transparent}
.btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px 18px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Spline Sans',sans-serif;white-space:nowrap}
.btn:hover{background:var(--accent-deep)}
.btn.ghost{background:transparent;color:var(--accent-deep);border:1px solid var(--line)}
.btn.ghost:hover{background:var(--paper)}
.err{color:var(--hot);font-size:13px;margin-top:10px;min-height:1px}
.setrow{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end;margin-top:12px}
.sublabel{font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin:18px 0 2px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.list{list-style:none}
.row{display:flex;align-items:center;justify-content:space-between;padding:12px 2px;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row .rd{font-size:14px}
.row .rd small{color:var(--muted);display:block;font-size:11px;letter-spacing:.04em;text-transform:uppercase}
.rowright{display:flex;align-items:center;gap:12px}
.row .rbf{font-family:'Spline Sans Mono',monospace;font-size:12px;color:var(--muted);width:42px;text-align:right}
.row .rw{font-family:'Spline Sans Mono',monospace;font-weight:600;font-size:17px}
.row .rdelta{font-family:'Spline Sans Mono',monospace;font-size:13px;width:52px;text-align:right}
.del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:4px 6px;border-radius:6px}
.del:hover{color:var(--hot);background:rgba(217,102,59,.1)}
.down{color:var(--accent-deep)}.up{color:var(--hot)}
.banner{background:rgba(201,138,43,.12);border:1px solid rgba(201,138,43,.4);color:#7A5410;border-radius:12px;padding:12px 14px;font-size:13px;margin-top:14px}
@media (max-width:600px){
  .now{font-size:48px}.strip{grid-template-columns:repeat(2,1fr)}.goals{grid-template-columns:1fr}
  .fields{grid-template-columns:1fr 1fr}.fields .btn{grid-column:1/-1}
  .setrow{grid-template-columns:1fr 1fr}.setrow .btn{grid-column:1/-1}
}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<input type="file" id="importFile" accept="application/json" style="display:none" />

<script>
const DAY = 86400000;
const KEY = "weightJourney.v1";
const C = {actual:"#1E7B5A",paceW:"#C98A2B",paceBF:"#4E73B8",trend:"#8A968F",hot:"#D9663B",accentDeep:"#145C42"};

const SEED = [
  {date:"2026-05-20",weight:259.9},{date:"2026-06-01",weight:253.8},{date:"2026-06-03",weight:252.9},
  {date:"2026-06-04",weight:250.7},{date:"2026-06-05",weight:248.0},{date:"2026-06-06",weight:248.5},
  {date:"2026-06-09",weight:246.3},{date:"2026-06-10",weight:246.0},{date:"2026-06-11",weight:244.7},
  {date:"2026-06-12",weight:244.3},{date:"2026-06-14",weight:244.5},{date:"2026-06-16",weight:244.3},
  {date:"2026-06-17",weight:241.6},{date:"2026-06-18",weight:241.4},{date:"2026-06-19",weight:241.6},
  {date:"2026-06-20",weight:241.8}
];
const DEF_CFG = {bfPct:31,goalWeight:215,goalWeightDate:"2026-08-06",goalBF:15,goalBFDate:"2026-09-04"};

let state = {entries:[...SEED], cfg:{...DEF_CFG}};
let showSet = false;
let storageOK = true;

const ts = iso => new Date(iso+"T00:00:00").getTime();
const fmtShort = t => new Date(t).toLocaleDateString("en-US",{month:"short",day:"numeric"});
const fmtDay = iso => new Date(iso+"T00:00:00").toLocaleDateString("en-US",{weekday:"long"});
const todayISO = () => new Date().toISOString().slice(0,10);
const lerp = (x0,y0,x1,y1,x)=> x1===x0?y0:y0+((y1-y0)*(x-x0))/(x1-x0);
const esc = s => String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));

function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw){ const p = JSON.parse(raw);
      if(p && Array.isArray(p.entries) && p.entries.length){ state = {entries:p.entries, cfg:{...DEF_CFG, ...(p.cfg||{})}}; return; }
    }
    save(); // seed first run
  }catch(e){ storageOK=false; }
}
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){ storageOK=false; }
}

function buildGoal(name,color,targetW,dateISO,latestT,latestW,slope,leanMass,isBF){
  const dT = ts(dateISO);
  const daysLeft = Math.max(0, Math.round((dT-latestT)/DAY));
  const weeksLeft = daysLeft/7;
  const toGo = latestW - targetW;
  const needWk = weeksLeft>0 ? toGo/weeksLeft : toGo;
  const needPct = (needWk/latestW)*100;
  const projW = latestW + slope*((dT-latestT)/DAY);
  const gap = projW - targetW;
  const projBF = ((projW-leanMass)/projW)*100;
  return {name,color,targetW,dateISO,dT,daysLeft,weeksLeft,toGo,needWk,needPct,projW,gap,projBF,isBF};
}

function computeModel(){
  const entries = [...state.entries].sort((a,b)=>ts(a.date)-ts(b.date));
  if(!entries.length) return null;
  const first=entries[0], last=entries[entries.length-1];
  const latestT=ts(last.date), latestW=last.weight;
  let effBF=state.cfg.bfPct;
  for(const e of entries) if(typeof e.bf==="number") effBF=e.bf;
  const leanMass=latestW*(1-effBF/100);
  const fatMass=latestW-leanMass;
  const goalBFWeight=leanMass/(1-state.cfg.goalBF/100);
  let pts=entries.filter(e=>ts(e.date)>=latestT-21*DAY).map(e=>({x:ts(e.date)/DAY,y:e.weight}));
  if(pts.length<4) pts=entries.map(e=>({x:ts(e.date)/DAY,y:e.weight}));
  let slope=0;
  if(pts.length>=2){
    const n=pts.length, sx=pts.reduce((a,p)=>a+p.x,0), sy=pts.reduce((a,p)=>a+p.y,0),
      sxx=pts.reduce((a,p)=>a+p.x*p.x,0), sxy=pts.reduce((a,p)=>a+p.x*p.y,0), d=n*sxx-sx*sx;
    slope = d!==0 ? (n*sxy-sx*sy)/d : 0;
  }
  const paceWk=slope*7, total=latestW-first.weight, days=Math.max(1,Math.round((latestT-ts(first.date))/DAY));
  const goalA=buildGoal("Birthday weight",C.paceW,state.cfg.goalWeight,state.cfg.goalWeightDate,latestT,latestW,slope,leanMass,false);
  const goalB=buildGoal(state.cfg.goalBF+"% body fat",C.paceBF,goalBFWeight,state.cfg.goalBFDate,latestT,latestW,slope,leanMass,true);
  return {entries,first,last,latestT,latestW,effBF,leanMass,fatMass,goalBFWeight,slope,paceWk,total,days,goalA,goalB};
}

function chartSVG(m){
  const W=700,H=320,padL=46,padR=18,padT=14,padB=26;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const xMin=m.entries.length?ts(m.entries[0].date):m.latestT;
  const horizonT=Math.max(m.goalA.dT,m.goalB.dT,m.latestT);
  const xMax=horizonT;
  const allW=[...m.entries.map(e=>e.weight),m.goalA.targetW,m.goalB.targetW,m.latestW+m.slope*((horizonT-m.latestT)/DAY)];
  const yMin=Math.floor(Math.min(...allW)-3), yMax=Math.ceil(Math.max(...allW)+3);
  const X=t=> padL + (xMax===xMin?0:(t-xMin)/(xMax-xMin))*plotW;
  const Y=w=> padT + (yMax-w)/(yMax-yMin)*plotH;

  let g="";
  // horizontal gridlines + y labels
  const yt=5;
  for(let i=0;i<=yt;i++){
    const w=yMin+(yMax-yMin)*i/yt, y=Y(w);
    g+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#DCE0DA"/>`;
    g+=`<text x="${padL-6}" y="${(y+4).toFixed(1)}" text-anchor="end">${Math.round(w)}</text>`;
  }
  // x labels
  const xt=4;
  for(let i=0;i<=xt;i++){
    const t=xMin+(xMax-xMin)*i/xt, x=X(t);
    g+=`<text x="${x.toFixed(1)}" y="${H-8}" text-anchor="middle">${fmtShort(t)}</text>`;
  }
  // actual area + line
  const pa=m.entries.map(e=>[X(ts(e.date)),Y(e.weight)]);
  if(pa.length){
    const line=pa.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
    const base=Y(yMin).toFixed(1);
    g+=`<defs><linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${C.actual}" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="${C.actual}" stop-opacity="0.02"/></linearGradient></defs>`;
    g+=`<path d="${line} L${pa[pa.length-1][0].toFixed(1)} ${base} L${pa[0][0].toFixed(1)} ${base} Z" fill="url(#fill)"/>`;
    g+=`<path d="${line}" fill="none" stroke="${C.actual}" stroke-width="2.5"/>`;
  }
  // pace + trend lines
  const seg=(x0,y0,x1,y1,color,dash)=>`<line x1="${x0.toFixed(1)}" y1="${y0.toFixed(1)}" x2="${x1.toFixed(1)}" y2="${y1.toFixed(1)}" stroke="${color}" stroke-width="2" stroke-dasharray="${dash}"/>`;
  g+=seg(X(m.latestT),Y(m.latestW),X(m.goalA.dT),Y(m.goalA.targetW),C.paceW,"6 5");
  g+=seg(X(m.latestT),Y(m.latestW),X(m.goalB.dT),Y(m.goalB.targetW),C.paceBF,"6 5");
  const projHW=m.latestW+m.slope*((horizonT-m.latestT)/DAY);
  g+=seg(X(m.latestT),Y(m.latestW),X(horizonT),Y(projHW),C.trend,"2 4");
  // actual dots
  m.entries.forEach(e=>{
    const isLast=ts(e.date)===m.latestT;
    g+=`<circle cx="${X(ts(e.date)).toFixed(1)}" cy="${Y(e.weight).toFixed(1)}" r="${isLast?6:3}" fill="${isLast?C.hot:C.actual}" stroke="#fff" stroke-width="${isLast?2.5:1.5}"><title>${fmtShort(ts(e.date))}: ${e.weight.toFixed(1)} lbs</title></circle>`;
  });
  // goal target dots + labels
  const gd=(g2)=>{const x=X(g2.dT),y=Y(g2.targetW);
    return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="5" fill="${g2.color}" stroke="#fff" stroke-width="2"/>`+
    `<text x="${(x-9).toFixed(1)}" y="${(y+4).toFixed(1)}" text-anchor="end" fill="${g2.color}" style="font-weight:600">${Math.round(g2.targetW)}</text>`;};
  g+=gd(m.goalA)+gd(m.goalB);
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Weight trend chart">${g}</svg>`;
}

function goalCard(g){
  const ok=g.gap<=0.05;
  return `<div class="goal">
    <div class="gh"><span class="gdot" style="background:${g.color}"></span><span class="gname">${esc(g.name)}</span></div>
    <div class="gtarget">${Math.round(g.targetW)}<i> lbs</i></div>
    <div class="gsub">${g.isBF?esc(state.cfg.goalBF+"% body fat, muscle held"):"target weight"} · by ${fmtShort(g.dT)}</div>
    <div class="grow"><span>To go</span><b>${g.toGo.toFixed(1)} lbs</b></div>
    <div class="grow"><span>Time left</span><b>${g.weeksLeft.toFixed(1)} wks</b></div>
    <div class="grow"><span>Needed pace</span><b>${g.needWk.toFixed(1)}/wk · ${g.needPct.toFixed(1)}%</b></div>
    <div class="grow"><span>At your pace</span><b>~${Math.round(g.projW)} lbs${g.isBF?" ("+Math.round(g.projBF)+"%)":""}</b></div>
    <span class="verdict ${ok?"v-good":"v-bad"}">${ok?"On pace":"Behind ~"+Math.abs(g.gap).toFixed(1)+" lbs"}</span>
  </div>`;
}

function render(){
  const m=computeModel();
  const app=document.getElementById("app");
  if(!m){ app.innerHTML='<p class="muted">No weigh-ins yet.</p>'; return; }
  const sign=v=>v<=0?"−":"+";
  const log=[...m.entries].reverse().map((e,i,arr)=>{
    const older=arr[i+1]; const d=older?e.weight-older.weight:null;
    return `<li class="row">
      <div class="rd">${fmtShort(ts(e.date))}<small>${fmtDay(e.date)}</small></div>
      <div class="rowright">
        <span class="rbf">${typeof e.bf==="number"?e.bf.toFixed(0)+"%":""}</span>
        <span class="rw">${e.weight.toFixed(1)}</span>
        <span class="rdelta ${d==null?"":d<=0?"down":"up"}">${d==null?"—":sign(d)+Math.abs(d).toFixed(1)}</span>
        <button class="del" data-del="${e.date}" aria-label="Remove">×</button>
      </div></li>`;
  }).join("");

  app.innerHTML = `
  <div class="eyebrow">Weight journey</div>
  <div class="hero">
    <div class="now">${m.latestW.toFixed(1)}<span>lbs</span></div>
    <div class="chip">${sign(m.total)}${Math.abs(m.total).toFixed(1)}<small>SINCE ${fmtShort(ts(m.first.date)).toUpperCase()}</small></div>
  </div>
  <p class="muted">~${m.effBF.toFixed(0)}% body fat · ~${Math.round(m.leanMass)} lbs lean · current trend ${sign(m.paceWk)}${Math.abs(m.paceWk).toFixed(1)} lbs/wk</p>
  ${storageOK?"":'<div class="banner">Storage looks blocked in this view — your data won\'t save here. Open this file as its own page (host it or add to home screen) and it\'ll persist.</div>'}

  <div class="strip">
    <div class="stat"><div class="k">Lost so far</div><div class="v" style="color:var(--accent)">${Math.abs(m.total).toFixed(1)}<small> lbs</small></div></div>
    <div class="stat"><div class="k">Per week</div><div class="v">${sign(m.paceWk)}${Math.abs(m.paceWk).toFixed(1)}<small> lbs</small></div></div>
    <div class="stat"><div class="k">Fat mass</div><div class="v">${Math.round(m.fatMass)}<small> lbs</small></div></div>
    <div class="stat"><div class="k">Days in</div><div class="v">${m.days}</div></div>
  </div>

  <div class="card">
    <div class="cardhead"><div class="cardtitle">Two finish lines</div>
      <button class="btn ghost" id="toggleSet">${showSet?"Close":"Edit goals"}</button></div>
    <div class="goals">${goalCard(m.goalA)}${goalCard(m.goalB)}</div>
    ${showSet?`
      <div class="sublabel">Birthday weight goal</div>
      <div class="setrow">
        <div class="field"><label>Target lbs</label><input class="input" id="sW" type="number" step="0.1" value="${state.cfg.goalWeight}"></div>
        <div class="field"><label>By date</label><input class="input" id="sWD" type="date" value="${state.cfg.goalWeightDate}"></div><div></div>
      </div>
      <div class="sublabel">Body-fat goal</div>
      <div class="setrow">
        <div class="field"><label>Target BF %</label><input class="input" id="sBF" type="number" step="0.5" value="${state.cfg.goalBF}"></div>
        <div class="field"><label>By date</label><input class="input" id="sBFD" type="date" value="${state.cfg.goalBFDate}"></div><div></div>
      </div>
      <div class="sublabel">Current body fat % (for the math)</div>
      <div class="setrow">
        <div class="field"><label>Current BF %</label><input class="input" id="sCurBF" type="number" step="0.5" value="${state.cfg.bfPct}"></div>
        <div></div><button class="btn" id="saveGoals">Save goals</button>
      </div>
      <div class="err" id="setErr"></div>
      <p class="muted">A smart scale's body-fat reading drifts a few points — trust the trend over any one number.</p>
    `:""}
    <div class="comp">
      <div><div class="k">${state.cfg.goalBF}% BF ≈</div><div class="v">${Math.round(m.goalBFWeight)} lbs</div></div>
      <div><div class="k">Lean mass</div><div class="v">${Math.round(m.leanMass)} lbs</div></div>
      <div><div class="k">Fat to lose</div><div class="v">${Math.round(Math.max(0,m.latestW-m.goalBFWeight))} lbs</div></div>
    </div>
  </div>

  <div class="card">
    <div class="cardtitle">The descent + the road ahead</div>
    <div class="chartbox">${chartSVG(m)}</div>
    <div class="legend">
      <div class="leg"><span class="swatch" style="border-top-color:${C.actual}"></span>Actual</div>
      <div class="leg"><span class="swatch" style="border-top-color:${C.paceW};border-top-style:dashed"></span>Pace to ${Math.round(m.goalA.targetW)}</div>
      <div class="leg"><span class="swatch" style="border-top-color:${C.paceBF};border-top-style:dashed"></span>Pace to ${state.cfg.goalBF}% BF</div>
      <div class="leg"><span class="swatch" style="border-top-color:${C.trend};border-top-style:dotted"></span>Your current pace</div>
    </div>
  </div>

  <div class="card">
    <div class="cardtitle" style="margin-bottom:14px">Add a weigh-in</div>
    <div class="fields">
      <div class="field"><label>Date</label><input class="input" id="dDate" type="date" max="${todayISO()}" value="${todayISO()}"></div>
      <div class="field"><label>Weight (lbs)</label><input class="input" id="dWeight" type="number" inputmode="decimal" step="0.1" placeholder="241.8"></div>
      <div class="field"><label>Body fat % (optional)</label><input class="input" id="dBf" type="number" inputmode="decimal" step="0.1" placeholder="—"></div>
      <button class="btn" id="addBtn">Add</button>
    </div>
    <div class="err" id="addErr"></div>
  </div>

  <div class="card">
    <div class="cardhead"><div class="cardtitle">Your data</div></div>
    <p class="muted" style="margin-bottom:12px">Lives on this device. Export a backup before switching phones, then Import it on the new one.</p>
    <div class="toolbar">
      <button class="btn ghost" id="exportBtn">Export backup</button>
      <button class="btn ghost" id="importBtn">Import backup</button>
    </div>
  </div>

  <div class="card">
    <div class="cardtitle" style="margin-bottom:6px">Every weigh-in</div>
    <ul class="list">${log}</ul>
  </div>`;

  bind();
}

function bind(){
  const byId=id=>document.getElementById(id);
  byId("toggleSet").onclick=()=>{showSet=!showSet;render();};
  byId("addBtn").onclick=()=>{
    const date=byId("dDate").value, w=parseFloat(byId("dWeight").value), bf=parseFloat(byId("dBf").value);
    const err=byId("addErr");
    if(!date){err.textContent="Pick a date.";return;}
    if(!isFinite(w)||w<=0){err.textContent="Enter a weight, like 241.8.";return;}
    const e={date,weight:Math.round(w*10)/10};
    if(isFinite(bf)&&bf>0&&bf<75)e.bf=Math.round(bf*10)/10;
    state.entries=[...state.entries.filter(x=>x.date!==date),e];
    save();render();
  };
  document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{
    const d=b.getAttribute("data-del");
    state.entries=state.entries.filter(e=>e.date!==d);save();render();
  });
  if(showSet){
    byId("saveGoals").onclick=()=>{
      const gw=parseFloat(byId("sW").value),gbf=parseFloat(byId("sBF").value),cbf=parseFloat(byId("sCurBF").value),
        gwd=byId("sWD").value,gbfd=byId("sBFD").value,err=byId("setErr");
      if(!isFinite(gw)||gw<=0){err.textContent="Enter a target weight.";return;}
      if(!isFinite(gbf)||gbf<=3||gbf>=60){err.textContent="Body-fat goal 4–59.";return;}
      if(!isFinite(cbf)||cbf<=3||cbf>=75){err.textContent="Enter current body fat %.";return;}
      if(!gwd||!gbfd){err.textContent="Set a date for each goal.";return;}
      state.cfg={bfPct:cbf,goalWeight:Math.round(gw*10)/10,goalWeightDate:gwd,goalBF:gbf,goalBFDate:gbfd};
      showSet=false;save();render();
    };
  }
  byId("exportBtn").onclick=()=>{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="weight-journey-backup-"+todayISO().replace(/-/g,"")+".json";
    document.body.appendChild(a);a.click();a.remove();
  };
  byId("importBtn").onclick=()=>document.getElementById("importFile").click();
}

document.getElementById("importFile").addEventListener("change",ev=>{
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const p=JSON.parse(r.result);
      if(p&&Array.isArray(p.entries)){
        state={entries:p.entries,cfg:{...DEF_CFG,...(p.cfg||{})}};
        save();render();
      }else alert("That file doesn't look like a Weight Journey backup.");
    }catch(e){alert("Couldn't read that backup file.");}
  };
  r.readAsText(f);
  ev.target.value="";
});

load();
render();
</script>
</body>
</html>
